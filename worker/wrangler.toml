name = "venue-scraper"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# After deploy, the worker URL becomes https://venue-scraper.<your-account>.workers.dev
# Set this URL as VITE_SCRAPER_URL in venue-outreach-db and VITE_SCRAPER_URL in athar-eventplanner.

# Secrets (set via wrangler secret put <NAME>):
#   BRAVE_API_KEY        — optional, enables /search (Brave Search API, 2k/month free)
#   OPENROUTER_API_KEY   — optional, enables LLM extraction in /enrich (free models used)
#   GOOGLE_MAPS_API_KEY  — optional, enables /places (Google Maps Places API, needs billing)
#   FOURSQUARE_API_KEY   — optional, adds Foursquare Places (free tier) to /discover
#   YELP_API_KEY         — optional, adds Yelp Fusion (free tier) to /discover
# Without secrets, /scrape and /discover still work (regex + Overpass, fully free).

# CORS allowlist — comma-separated origins, or "*" for any.
# Tighten in production: "https://venue-outreach-db.pages.dev,https://athar-eventplanner.pages.dev"
[vars]
ALLOWED_ORIGINS = "*"
